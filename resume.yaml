  summary: Research assistant on a DARPA-funded oral history of ARPANET protocol strategy; conducted structured interviews with senior technical and government officials and performed archival research on early internet history.
  highlights:
  - Conducted structured SME interviews with senior technical and government officials, including at the Assistant Secretary of Defense level, as part of a DARPA-funded oral history of ARPANET protocol strategy.
  - "Assessed primary source corpora on early ARPANET and internet history; built taxonomies and finding aids (structured, researcher-facing summaries) to make materials navigable and discoverable."
