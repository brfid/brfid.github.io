  - pytest
- name: Wireword
  description: "Lint tool for LLM agent control words: route names, tool names, exact enum values. Distinguishes agent-aware label collisions, where the model can emit a label and a wrong match triggers incorrect tool calls or routing, from generic string similarity. Research grounded in telegraph codebook design."
  keywords:
  - Python
  - CLI
  - Agent systems
  - pytest
