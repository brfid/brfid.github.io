work:
- name: DomainTools
  position: Principal Technical Writer
  url: https://docs.domaintools.com
  location: Seattle (Remote), WA, US
  startDate: '2026-07-01'
  summary: "Continuing the documentation platform program started at Senior level, as technical lead for the function working with a documentation specialist for a 150-person B2B security intelligence company serving 800+ customers. Current focus: building LLM workflows as products and techdocs as an internal service."
  highlights:
  - "Building techdocs as an internal service: a documentation platform other teams integrate with for their own doc-writing needs, not internal-docs authoring for specialized teams."
  - "Building LLM workflows as products: agent skills and rules, and a governed, self-learning memory of past solutions (BM25, human-reviewed via PR), operated by other writers rather than one-off scripts."
- name: DomainTools
  position: Senior Technical Writer
  startDate: '2025-01-01'
  endDate: '2026-06-01'
  summary: "Built the documentation platform engineering function from scratch: OpenAPI-as-contract, docs-as-code CI/CD with reproducible builds, SDLC integration, production AI tooling, and a multi-consumer model treating human readers, customer-run coding agents, and CI pipelines as distinct audiences."
  highlights:
  - Built a containerized build pipeline that generates the docs site, PDFs, and plain-text versions for language models, with reproducible builds that catch drift between the published output and its source. Adopted by the team.
  - Defined OpenAPI specifications across four API product lines; specs govern production code generation, Swagger UI rendering, contract validation, and Schemathesis conformance testing.
  - "Moved documentation into the SDLC: critical updates ship same-day, products launch with docs at tech preview, and the platform's contribution model lets engineers in four teams contribute directly via git and review documentation MRs."
  - Replaced an outsourced WordPress/Confluence changelog pipeline with a self-operated docs.domaintools.com/changelog system serving RSS and JSON feeds.
  - "Built a production MCP server for deterministic quality control in LLM-assisted documentation (Vale, markdownlint, spaCy, and custom linters as callable tools), and tested it by its effect on the model's behavior to sharpen its tool and resource definitions so the model uses them more reliably."
  - "Designed a governed, human-in-the-loop memory for AI agents: lessons from completed work are promoted into reusable skills through human-approved PR transitions, so agent knowledge improves without silent drift. Adopted across multiple agent tools."
  - Developed a cold-start completeness test methodology for evaluating documentation coverage from zero; produced a reusable build-trial harness for assessing MCP server documentation at launch.
- name: DomainTools
  position: Technical Writer
  startDate: '2023-10-01'
  endDate: '2024-12-01'
  summary: "Joined as the first dedicated technical writer. Built the documentation platform from scratch: authored strategy, style guide, and contribution guide; selected tooling and established the docs.domaintools.com architecture."
  highlights:
  - "Authored the company's documentation strategy, style guide, and contribution guide from scratch: platform architecture, tooling selection, SDLC integration, SME contribution workflows, and quality standards."
- name: JPMorgan Chase & Co.
  position: Contract Technical Writer
  startDate: '2023-04-01'
  endDate: '2023-09-01'
  summary: "Owned the Hybrid Cloud Migration Hub, an enterprise Confluence portal supporting 50,000+ engineers in JPMC's central IT division through a hyperscale hybrid cloud datacenter modernization."
  highlights:
  - Drafted cloud migration and configuration management policy reviewed and approved by VPs and Managing Directors; documentation passed external audit.
  - Coordinated documentation deliverables with CM tooling development teams across cross-functional working sessions.
  location: Jersey City (Hybrid), NJ, US
- name: Romeo Power, Inc.
  position: Technical Writer (Document Control Analyst II)
  startDate: '2022-06-01'
  endDate: '2023-03-01'
  summary: Brought SDLC and configuration management documentation to ASPICE certification readiness for an EV battery manufacturer in the automotive supply chain.
  highlights:
  - Interviewed engineering SMEs to document SDLC practices including git workflows, branching strategies, and release processes for ASPICE process compliance.
  - Produced B2B technical documentation and document control artifacts meeting ISO 9001 and ASPICE requirements; documentation passed compliance assessment.
  - Earned intacs Automotive SPICE Provisional Assessor certification.
  location: Los Angeles (Remote), CA, US
- name: Stevens Institute of Technology
  position: Faculty (Assistant Professor), Science and Technology Studies
  url: https://www.stevens.edu
  startDate: '2017-08-01'
  endDate: '2022-05-01'
  summary: Led funded research and consulting engagements for Google, ICANN, NSF, and Lockheed Martin alongside a faculty appointment in Science and Technology Studies.
  highlights:
  - Co-PI on NSF EAGER grant on SOC performance metrics; contributed the historical analysis of SOC operations alongside the team's ethnographic study.
  - Co-authored a history of unique identifier creation and administration from ARPANET origins through 2017; jointly commissioned by ICANN and Google; used in policy deliberations on IP governance and ownership.
  - Wrote historical lessons-learned analysis of distributed simulation for a Lockheed Martin defense program.
  - "Received institutional teaching recognition for courses that required translation in both directions: STEM students through policy, historians through networking and computing."
  location: Hoboken (Hybrid), NJ, US
