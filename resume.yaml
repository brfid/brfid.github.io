work:
- name: DomainTools
  position: Senior Technical Writer
  url: https://docs.domaintools.com
  location: Seattle (Remote), WA, US
  startDate: '2023-10-01'
  summary: "Own docs.domaintools.com end-to-end — platform architecture, tooling, CI/CD, GitOps-managed deployment, and documentation strategy — as technical lead directing a documentation specialist for a 150-person B2B security intelligence company serving 800+ customers."
  highlights:
  - Own docs.domaintools.com end-to-end — platform architecture, tooling, CI/CD, GitOps-managed deployment, and documentation strategy — as technical lead directing a documentation specialist for a 150-person B2B security intelligence company serving 800+ customers. Replaced an outsourced WordPress/Confluence changelog pipeline with a self-operated docs.domaintools.com/changelog system serving RSS and JSON feeds.
  - "Built a production MCP server for deterministic quality control in LLM-assisted documentation — integrates Vale, markdownlint, spaCy, and custom linters as callable tools, enabling consistent quality at scale without reviewer bottlenecks."
  - Defined OpenAPI specifications across 4 API product lines; specs govern production code generation, Swagger UI rendering, contract validation, and Schemathesis conformance testing.
  - "Moved documentation into the SDLC: critical updates ship same-day, products launch with docs at tech preview, and engineers across 4 teams contribute directly via git and review documentation MRs."
  - Designed a multi-consumer documentation model treating human readers, AI agents, and automated pipelines as distinct audiences — each with different access patterns, metadata requirements, and context windows.
  - Developed a cold-start completeness test methodology for evaluating documentation coverage from zero; produced a reusable build-trial harness for assessing MCP server documentation at launch.
  - Authored the company's documentation strategy, style guide, and contribution guide from scratch — platform architecture, tooling selection, SDLC integration, SME contribution workflows, and quality standards.
