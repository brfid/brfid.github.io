- name: DomainTools
  position: Senior Technical Writer
  url: https://docs.domaintools.com
  location: Seattle (Remote), WA, US
  startDate: '2023-10-01'
  summary: "Own docs.domaintools.com, documentation strategy, and all supporting tooling for a 150-person B2B security intelligence company serving 800+ customers. Technical lead for the documentation function, directing a documentation specialist. Moved documentation into the SDLC — critical updates ship same-day, and products launch with docs at tech preview."
  highlights:
  - Reduced documentation cycle time from weeks to same-day for critical updates; products now launch with docs at tech preview — as the company's sole technical writer owning strategy, platform, tooling, and all content.
  - "Authored the company's documentation strategy and roadmap from scratch — platform architecture, tooling selection, SDLC integration, SME contribution workflows, and quality standards."
  - Migrated 120+ documents into a unified MkDocs-Material platform with CI/CD, Swagger UI, and SME contribution workflows across 4 engineering teams.
  - Defined OpenAPI specifications across 4 API product lines; specs govern production code generation, Swagger UI rendering, and contract validation.
  - Built Python/Jinja2/LaTeX PDF generator with theming and dynamic TOC for branded customer-facing documentation.
  - "Built a production MCP server for deterministic quality control in LLM-assisted documentation — integrates Vale, markdownlint, spaCy, and custom linters as callable tools, enabling consistent quality at scale without reviewer bottlenecks."
  - Owned the full deployment stack for docs.domaintools.com — container-based image builds, GitOps-managed cluster deployments, and CI/CD pipelines that map environment branching strategy to staged promotion across dev and production.
  - "Authored the company's documentation style guide and contribution guide; enabled engineering teams to contribute directly to the docs platform via git. Engineers review documentation MRs; API reference verified against source code."
