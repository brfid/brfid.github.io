tagline: "Principal Technical Writer: Documentation platforms that stay true as products and AI change"
principal_headline: "Principal Technical Writer"
profile: |-
  I keep documentation true as products and their tools change, so customer integrations don't break quietly when AI agents read stale docs as fact. I build and run docs.domaintools.com for a B2B security intelligence company used by 800+ customers: platform architecture, OpenAPI-as-contract across four API product lines, contract tests that poll the live API, CI/CD, and a production MCP server for quality control in LLM-assisted documentation. Before industry: PhD research on internet history, peer-reviewed work at USENIX Security and IEEE Annals, and a commissioned history of the internet for Google and ICANN.

