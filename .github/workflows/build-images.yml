name: Build vintage pipeline images

# Builds and pushes the VAX and PDP-11 SIMH Docker images to ghcr.io.
# Images are consumed by edcloud-vintage-runner.sh via pull-or-build logic.
#
# Trigger: push to main that modifies Dockerfiles or pexpect scripts.
# Manual trigger: workflow_dispatch (useful after SHA pin updates).
#
# Published images:
#   ghcr.io/brfid/vax-pexpect:latest
#   ghcr.io/brfid/pdp11-pexpect:latest
#
# NOTE: After first push, set both packages to Public in:
#   https://github.com/brfid?tab=packages
# Public packages can be pulled on edcloud without credentials.

on:
  push:
    branches:
      - main
    paths:
      - "vintage/machines/vax/Dockerfile.vax-pexpect"
      - "vintage/machines/vax/configs/vax780-pexpect.ini"
      - "vintage/machines/pdp11/Dockerfile.pdp11-pexpect"
      - "vintage/machines/pdp11/configs/pdp11-pexpect.ini"
      - "scripts/vax_pexpect.py"
      - "scripts/pdp11_pexpect.py"
      - "scripts/simh_session.py"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push vax-pexpect
        uses: docker/build-push-action@v6
        with:
          context: .
          file: vintage/machines/vax/Dockerfile.vax-pexpect
          push: true
          tags: ghcr.io/brfid/vax-pexpect:latest
          cache-from: type=gha,scope=vax-pexpect
          cache-to: type=gha,mode=max,scope=vax-pexpect

      - name: Build and push pdp11-pexpect
        uses: docker/build-push-action@v6
        with:
          context: .
          file: vintage/machines/pdp11/Dockerfile.pdp11-pexpect
          push: true
          tags: ghcr.io/brfid/pdp11-pexpect:latest
          cache-from: type=gha,scope=pdp11-pexpect
          cache-to: type=gha,mode=max,scope=pdp11-pexpect

      - name: Summary
        run: |
          echo "## Images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/brfid/vax-pexpect:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/brfid/pdp11-pexpect:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "SHA: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
