name: "Bradley Fidler"
label: "Principal Technical Writer: Documentation Platform Engineering & LLM Integration"
about: "I own documentation end-to-end (content, platform, and AI integration) for a B2B security intelligence company serving 800+ customers. I built and run docs.domaintools.com: platform architecture, CI/CD, OpenAPI-as-contract across four API product lines, deployment, and a production MCP server for LLM-assisted documentation quality control. Before industry: PhD research on internet history, peer-reviewed work at USENIX Security and IEEE Annals, and a commissioned history of the internet for Google and ICANN."
principal_headline: "Principal Technical Writer"
