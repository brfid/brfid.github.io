name: "Bradley Fidler"
label: "Principal Technical Writer — API documentation, developer experience, AI workflows"
summary: "I build documentation platforms and the tooling that powers them — CI/CD pipelines, OpenAPI workflows, LLM integrations. At DomainTools I run docs.domaintools.com for a B2B security intelligence platform and moved documentation into the development cycle so it ships when features do. I published peer-reviewed work at USENIX Security and IEEE Annals and wrote a commissioned history of the internet for Google and ICANN."
about: >-
  Most of my career has been about how information gets structured — what the structure makes easy to find, and what it buries. That holds whether the subject is internet governance, enterprise documentation, or API reference. The domain changes; the question doesn't.
