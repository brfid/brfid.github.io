  - title: "Writing & Methodology"
    items:
      - name: "Lessons from the Telegraph for LLM Agent Design"
        url: "/posts/wireword-control-words/"
        year: 2026
        summary: "Published essay. Systematic review of telegraph techniques (compression,
          error correction, codebook design) applied to LLM agent architectures — finding
          that most practices survived as information-management fundamentals, and the one
          actionable gap is redundancy in control-label design. Cites recent arxiv research
          on LLM tool-selection sensitivity and adversarial tool-name attacks. Paired with the
          Wireword linter as a proof artifact."
        tags: [LLM, agents, history, telegraph, research]

      - name: "Strachey's Principle: The Discipline That Makes Abstraction Work"
        url: "/posts/stracheys-principle/"
        year: 2026
        summary: "Published essay. Argues that the power of an abstraction layer comes from
          committing to it entirely — partial adoption breaks the model. Traces this principle
          from Strachey's 1965 macrogenerator through Dijkstra, Kay, and into current LLM-assisted
          work. Closes with first-person investment in the discipline of learning LLM failure
          modes."
        tags: [history, computing, LLM, programming, methodology]

      - name: "Using CHANGELOG.md as LLM Session Memory"
        url: "/posts/changelog-as-llm-memory/"
        year: 2026
        summary: "Practical workflow essay. Documents the Keep a Changelog [Unreleased] section
          pattern as structured LLM session state — a small, version-controlled working-memory
          document that reduces cold-start orientation cost and preserves accruable context
          across sessions."
        tags: [LLM, documentation, workflow, methodology]

  - title: "Tools & Automation"
    items:
      - name: "Wireword"
        url: "https://github.com/brfid/wireword"
        year: 2026
        summary: "Linter for LLM agent control labels: route names, tool names, enum
          values, environments, and approval targets. Detects confusable label pairs weighted
          by what the label controls — visual confusables, edit-distance-one, case-only,
          punctuation-only, plural/stem collisions, and production-alias overload. Research
          grounded in telegraph codebook design (Bentley's two-letter-difference rule, ABC
          Code). Config-aware linting with effect-based severity escalation."
        status: live
        tags: [Python, LLM, agents, linting, CLI]

      - name: "lcost"
        url: "https://github.com/brfid/lcost"
        year: 2026
        summary: "Local CLI and LCARS TUI for tracking LLM token and cost data across Claude
          Code and Cline sessions. Reads session files, deduplicates against a local ledger,
          reports cost and token breakdowns across multiple providers (Anthropic, OpenAI,
          Bedrock, Google, Meta, Mistral)."
        status: live
        tags: [Python, TUI, "AI tooling", cost]

      - name: "edcloud"
        url: "https://github.com/brfid/edcloud"
        year: 2026
        summary: "Single-instance AWS EC2 personal cloud lab: Tailscale-only access, CLI
          lifecycle tooling, persistent state volume, snapshots, restore drills, runbooks,
          and cost guardrails. Designed to be operated from lightweight ARM/Linux nodes."
        status: live
        tags: [Python, AWS, Tailscale, runbooks]

      - name: "brfid.github.io Publishing Pipeline"
        url: "https://github.com/brfid/brfid.github.io"
        year: 2026
        summary: "This site: Hugo static publishing with GitHub Actions deployment. A vintage
          computing pipeline drives emulated VAX and PDP-11 systems via SIMH/pexpect to generate
          a man-page resume artifact — a technical signal of systems-level documentation
          thinking."
        status: live
        tags: [Hugo, Python, "GitHub Actions", SIMH, CI/CD]

  - title: "Research & Publications"
    items:
      - name: "Work-From-Home and COVID-19: Trajectories of Endpoint Security Management in a Security Operations Center"
        url: "https://www.usenix.org/conference/usenixsecurity23/presentation/jones"
        year: 2023
        role: "Co-author"
        publisher: "USENIX Security '23"
        summary: "Peer-reviewed paper. Co-authored historical analysis tracing
          endpoint security management from the 1970s through the COVID-19
          work-from-home transition, complementing a 1,000-hour SOC ethnography."
        status: live
        tags: ["peer-reviewed", security, "historical research"]

      - name: "The Creation and Administration of Unique Identifiers, 1967-2017"
        url: "https://www.icann.org/en/system/files/files/creation-administration-unique-identifiers-1967-2017-18nov20-en.pdf"
        year: 2020
        role: "Co-author"
        publisher: "ICANN / Google"
        summary: "Comprehensive history of internet unique identifier creation and
          administration from ARPANET origins through 2017. Jointly commissioned by
          ICANN and Google for policy deliberations on IP governance and ownership."
        status: live
        tags: [research, "internet history", ARPANET, policy]

      - name: "Edge Cryptography and the Codevelopment of Computer Networks and Cybersecurity"
        url: "https://doi.org/10.1109/MAHC.2016.49"
        year: 2016
        role: "Author"
        publisher: "IEEE Annals of the History of Computing"
        summary: "Peer-reviewed article on the co-development of cryptography and
          networking, tracing the relationship between edge devices and the evolution
          of network security."
        status: live
        tags: ["peer-reviewed", cryptography, "internet history"]
