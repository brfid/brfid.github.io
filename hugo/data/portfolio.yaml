sections:
  - title: "Featured Case Studies"
    items:
      - name: "DomainTools Documentation Platform"
        url: "https://docs.domaintools.com"
        year: 2025
        role: "Author"
        publisher: "DomainTools"
        summary: "Platform architecture, documentation strategy, and end-to-end ownership of
          docs.domaintools.com for a 150-person B2B security intelligence company serving 800+
          customers. OpenAPI-as-contract across four API product lines, CI/CD with GitOps-managed
          deployment, SME contribution workflows across 4 engineering teams, and AI-integrated
          quality control via DDT. Unified 120+ documents from scattered sources into a single
          MkDocs-Material platform with Swagger UI, search, and release-cycle integration.
          Produces auto-generated structured context files (llms.txt, LLM context files)
          covering all API products and data schemas via CI/CD for use in LLM tooling and
          retrieval workflows."
        status: live
        tags: ["documentation systems", MkDocs, "OpenAPI", CI/CD, "GitOps", security, LLM]

      - name: "Documentation Diagnostic Tools (DDT)"
        url: "https://docs.domaintools.com/llm/"
        year: 2025
        role: "Author"
        publisher: "Internal · DomainTools · production"
        summary: "Production MCP server for deterministic quality control in LLM-assisted
          documentation. Integrates Vale, markdownlint, spaCy, and custom linters as callable MCP
          tools — giving LLM writing assistants a structured, auditable quality gate.
          TODO: quantified outcomes pending — number of checks, docs gated, what it replaced,
          before/after error or consistency rates."
        status: live
        tags: [MCP, LLM, "quality control", Python, "production"]

