sections:
  - title: "Featured Case Studies"
    items:
      - name: "DomainTools Documentation Platform"
        url: "https://docs.domaintools.com"
        year: 2025
        role: "Author"
        publisher: "DomainTools"
        summary: "Documentation platform for a B2B security intelligence company:
          unified 120+ documents from scattered sources into a single MkDocs-Material
          site with CI/CD, search, versioning, Swagger UI, SME contribution workflows,
          and release-cycle integration."
        status: live
        tags: ["documentation systems", MkDocs, CI/CD, security]

      - name: "brfid.github.io Publishing Pipeline"
        url: "https://github.com/brfid/brfid.github.io"
        year: 2026
        summary: "This site: Hugo static publishing with generated resume artifacts,
          GitHub Actions deployment, and a vintage pipeline that drives emulated VAX
          and PDP-11 systems via SIMH/pexpect to generate a man-page resume artifact."
        status: live
        tags: [Hugo, Python, "GitHub Actions", SIMH, CI/CD]

  - title: "Documentation Systems"
    items:
      - name: "DomainTools Product Documentation"
        url: "https://docs.domaintools.com"
        year: 2025
        role: "Author"
        publisher: "DomainTools"
        summary: "User-facing documentation for DomainTools security intelligence
          products and workflows. Consolidated product docs, API references, and
          contributor workflows into a single docs-as-code platform."
        status: live
        tags: ["product documentation", "docs-as-code", security]

      - name: "DomainTools LLM Context Files"
        url: "https://docs.domaintools.com/llm/"
        year: 2025
        role: "Author"
        publisher: "DomainTools"
        summary: "Auto-generated structured context files covering DomainTools API
          products and data schemas, produced by CI/CD for use in LLM tooling and
          retrieval workflows."
        status: live
        tags: [LLM, RAG, CI/CD, "structured data"]

  - title: "Developer Documentation"
    items:
      - name: "Threat Feeds OpenAPI Specification"
        url: "https://docs.domaintools.com/feeds/openapi/"
        year: 2025
        role: "Author"
        publisher: "DomainTools"
        summary: "OpenAPI specification for real-time and batch feed delivery,
          including examples, reusable schemas, error contracts, and download
          workflows."
        status: live
        tags: [OpenAPI, "API documentation", "developer docs"]

      - name: "DomainTools API Reference"
        url: "https://docs.domaintools.com/api/"
        year: 2025
        role: "Author"
        publisher: "DomainTools"
        summary: "API reference documentation for DomainTools data products and
          endpoints, covering the public product surface across four API product
          lines."
        status: live
        tags: ["API documentation", "developer docs", security]

      - name: "DomainTools Python SDK"
        url: "https://docs.domaintools.com/python-sdk/"
        year: 2025
        role: "Author"
        publisher: "DomainTools"
        summary: "Developer guide and API reference: installation, authentication,
          usage patterns, and method reference for Python SDK users."
        status: live
        tags: ["SDK documentation", Python, "developer docs"]

  - title: "Tools, Automation, and AI"
    items:
      - name: "lcost"
        url: "https://github.com/brfid/lcost"
        year: 2026
        summary: "AI cost tracking and terminal dashboard for Claude Code and Cline
          workflows. Built to make token use, cache behavior, project-level spend,
          and model mix visible during everyday AI-assisted work."
        status: live
        tags: [Python, Textual, TUI, "AI tooling"]

      - name: "Wireword"
        url: "https://github.com/brfid/wireword"
        year: 2026
        summary: "Linter for LLM agent control labels: route names, tool names, enum
          values, environments, approval targets, and other short labels that can
          change agent behavior if misread or confused."
        status: live
        tags: [Python, LLM, agents, linting]

      - name: "oldspeak"
        url: "https://github.com/brfid/oldspeak"
        year: 2026
        summary: "Small MCP server exposing practical prose checks derived from
          Orwell's rules as callable document-analysis tools, with normalized
          findings, filtering, caching, and MCP runtime tests."
        status: live
        tags: [Python, MCP, "writing tools"]

      - name: "edcloud"
        url: "https://github.com/brfid/edcloud"
        year: 2026
        summary: "Single-instance AWS EC2 Linux workflow environment used when local
          Linux hardware is offline: Tailscale-only access, CLI lifecycle tooling,
          persistent state volume, snapshots, restore drills, runbooks, and cost
          guardrails."
        status: live
        tags: [Python, AWS, Tailscale, runbooks]

  - title: "Research and Publications"
    items:
      - name: "The Creation and Administration of Unique Identifiers, 1967-2017"
        url: "https://www.icann.org/en/system/files/files/creation-administration-unique-identifiers-1967-2017-18nov20-en.pdf"
        year: 2020
        role: "Co-author"
        publisher: "ICANN / Google"
        summary: "Comprehensive history of internet unique identifier creation and
          administration from ARPANET origins through 2017. Jointly commissioned by
          ICANN and Google for policy deliberations on IP governance and ownership."
        status: live
        tags: [research, "internet history", ARPANET, policy]

      - name: "Work-From-Home and COVID-19: Trajectories of Endpoint Security Management in a Security Operations Center"
        url: "https://www.usenix.org/conference/usenixsecurity23/presentation/jones"
        year: 2023
        role: "Co-author"
        publisher: "USENIX Security '23"
        summary: "Peer-reviewed paper. Co-authored historical analysis tracing
          endpoint security management from the 1970s through the COVID-19
          work-from-home transition, complementing a 1,000-hour SOC ethnography."
        status: live
        tags: ["peer-reviewed", security, "historical research"]

      - name: "Edge Cryptography and the Codevelopment of Computer Networks and Cybersecurity"
        url: "https://doi.org/10.1109/MAHC.2016.49"
        year: 2016
        role: "Author"
        publisher: "IEEE Annals of the History of Computing"
        summary: "Peer-reviewed article on the co-development of cryptography and
          networking, tracing the relationship between edge devices and the evolution
          of network security."
        status: live
        tags: ["peer-reviewed", cryptography, "internet history"]
